# Central configuration for the semi-3D-anime image generation agent.
# Read by both the MCP server and the agent harness.

image:
  # Model registry. Default is SDXL DreamShaper-XL — highest fidelity to the glossy
  # semi-3D-anime reference samples. Runs on M1 (32GB) via diffusers + MPS.
  default_model: dreamshaper-xl
  models:
    dreamshaper-xl:                     # full SDXL @ 1024px — best quality (~1-2 min/image)
      repo: Lykon/dreamshaper-xl-1-0
      arch: sdxl
    dreamshaper-xl-turbo:               # distilled SDXL — much faster, lower fidelity
      repo: Lykon/dreamshaper-xl-v2-turbo
      arch: sdxl
    dreamshaper-8:                      # SD1.5 — fastest, lower fidelity (~50-70s/image)
      repo: Lykon/dreamshaper-8
      arch: sd15

  device: mps          # "mps" on Apple Silicon, "cpu" fallback, "cuda" if available
  # dtype applies to SD1.5. On MPS, BOTH SD1.5 and SDXL run fp32 — fp16 overflows to NaN
  # (black images) on Metal (SDXL's UNet, SD1.5's VAE). Reliable but ~2-3 min/image at 1024.
  dtype: float32
  steps: 25            # SDXL quality; lower for faster runs
  # 7.5 tightens prompt adherence (pose/composition/palette) vs the looser 6.5. DreamShaper-XL
  # base stays clean here; push past ~8 and it starts to oversaturate/contrast-clip.
  guidance_scale: 7.5
  # 768 is the reliable default on M1/32GB: fp32 SDXL @ 768 fits in unified memory (~56s/img).
  # 1024 looks better but SDXL(~14GB)+CLIP eval exceeds 32GB -> macOS swaps -> ~30 min/img.
  # Only raise to 1024 with most other apps closed.
  width: 768
  height: 768
  seed: -1             # -1 = random each run

  # ControlNet gives SDXL the spatial control that prompts alone cannot: it conditions the UNet
  # on control images built from the scene plan (mcp_server/scene_planner.py) so poses and
  # placements ("standing on top of a giant burger, arms up") are enforced structurally instead
  # of left to CLIP's bag-of-words. `controls` lists which ControlNets to stack; each is loaded
  # lazily on first use (~2.5GB). Default is openpose only — on a 32GB M1, fp32 SDXL + two fp32
  # ControlNets can exceed RAM and swap; add "depth" only with memory headroom.
  controlnet:
    controls: [openpose]                 # extensible, e.g. [openpose, depth]
    openpose:
      repo: xinsir/controlnet-openpose-sdxl-1.0
      conditioning_scale: 0.7            # how hard the skeleton constrains pose/placement (0..1)
    depth:                                # opt-in object-layout control (filled-box depth map)
      repo: diffusers/controlnet-depth-sdxl-1.0
      conditioning_scale: 0.55

llm:
  provider: ollama
  model: qwen3.5:4b    # lightweight, already pulled; configurable
  temperature: 0.7
  # Used by enhance_prompt / refine_prompt and the optional vision judge.
  vision_model: gemma4:12b

evals:
  # Loop gate thresholds (0..1). Generation is accepted when both are met.
  # Calibrated for open_clip ViT-L/14: stylized on-prompt renders score ~0.18 (a mismatch goes
  # negative, e.g. -0.08), so 0.18 is a meaningful-but-reachable alignment bar.
  clip_threshold: 0.18
  # ViT-L/14 style similarity to the samples is framing-sensitive: ~0.37 for wide full-body
  # party scenes, ~0.59 for character close-ups. 0.40 passes genuinely on-style renders while
  # still triggering refinement on off-style drift; the loop always keeps the best image.
  style_threshold: 0.40
  enable_vision_judge: false   # off by default — slow on the loop path

# Scene planning: parse the request into entities + spatial relations + per-human poses, used to
# build ControlNet conditioning and the verifier's checklist. Disable to fall back to the old
# plain prompt->image path.
scene_planning:
  enabled: true

# VLM constraint verifier: a multimodal model judges each scene-plan constraint (pose, placement,
# count) per render and drives structural replanning. Uses the local llm.vision_model (offline).
verify:
  enabled: true
  model: gemma4:12b            # falls back to llm.vision_model if unset

loop:
  # generate -> evaluate -> verify -> replan, up to N times. Higher for correctness on hard
  # spatial prompts (SDXL+ControlNet ~2-3 min/img, plus the VLM check each pass).
  max_iters: 5
  # Keep only the correct version: after the run, delete every rejected render (PNG + sidecar
  # JSON), leaving outputs/ with just the kept best/passing image. Set false to keep all attempts.
  keep_only_best: true

paths:
  outputs: outputs
  samples: images      # reference images for style-similarity eval
